# HI-TECH SERGIO — публичный деплой (Netlify, бесплатно)
[build]
  publish = "."
  # Статический сайт; команда всегда успешна (деплой не должен skip).
  command = "echo deploy $(date -u +%Y%m%dT%H%M%SZ)"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/hi-tech-sergio.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/aeon/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
